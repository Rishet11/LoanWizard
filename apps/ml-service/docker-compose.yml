version: '3.8'

services:
  ml-service:
    build:
      context: .
      args:
        TRAIN_MODEL: "false"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://loan:loan@db:5432/loan
      - PERSONA_STRATEGY=rules_first
      - USE_MOCK_BUREAU=true
      - ENABLE_GEMINI_FALLBACK=false
      # Uncomment to enable Gemini persona fallback:
      # - GEMINI_API_KEY=your_key_here
      # - ENABLE_GEMINI_FALLBACK=true
    volumes:
      # Model artifact persisted between rebuilds
      - ./app/models/risk_mlp:/app/app/models/risk_mlp
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: loan
      POSTGRES_PASSWORD: loan
      POSTGRES_DB: loan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

# ── To point at a shared Postgres instance (Stream C's DB) ──
# Remove the 'db' service above and set:
#   DATABASE_URL=postgresql://loan:loan@<shared-host>:5432/loan
# in the ml-service environment block.
